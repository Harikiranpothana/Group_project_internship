<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsightIQ — Enterprise Business Intelligence Copilot</title>
  <meta name="description" content="Ask anything about your business data. InsightIQ turns natural language into SQL, runs it, and hands back the answer." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ============ NAVBAR ============ -->
  <header class="navbar" id="navbar">
    <div class="navbar__inner">
      <div class="navbar__brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="22" height="22">
            <path d="M4 22 L11 12 L17 18 L28 6" stroke="currentColor" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="28" cy="6" r="2.2" fill="currentColor"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-title">InsightIQ</span>
          <span class="brand-subtitle">Enterprise Business Intelligence Copilot</span>
        </div>
      </div>

      <div class="navbar__actions">
        <button class="icon-btn" id="newChatBtn" title="New chat" aria-label="Start a new chat">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m-7-7h14"/></svg>
          <span class="icon-btn__label">New chat</span>
        </button>
        <button class="icon-btn icon-btn--square" id="darkModeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
          <svg id="iconSun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path stroke-linecap="round" d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg id="iconMoon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <button class="icon-btn icon-btn--square" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
        <div class="avatar" title="Account" aria-label="Account">A</div>
      </div>
    </div>
  </header>

  <!-- ============ MAIN ============ -->
  <main class="app-main">

    <!-- Welcome / empty state -->
    <section class="empty-state" id="emptyState">
      <div class="empty-state__icon">
        <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3a9 9 0 100 18 9 9 0 000-18z" stroke-opacity="0"/><path stroke-linecap="round" stroke-linejoin="round" d="M4 20l1.6-4.6A8 8 0 1112 20a7.9 7.9 0 01-4-1.08L4 20z"/><circle cx="9" cy="11" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="11" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="11" r="1" fill="currentColor" stroke="none"/></svg>
      </div>
      <h1 class="empty-state__heading">Ask anything about your business data</h1>
      <p class="empty-state__subtitle">InsightIQ writes the SQL, runs it on BigQuery, and brings back a clear answer with the underlying rows.</p>

      <div class="examples" id="examples">
        <button class="example-chip" data-question="Show first 10 passengers">
          <span class="example-chip__icon">🧾</span> Show first 10 passengers
        </button>
        <button class="example-chip" data-question="Highest revenue locations">
          <span class="example-chip__icon">📍</span> Highest revenue locations
        </button>
        <button class="example-chip" data-question="Trips completed today">
          <span class="example-chip__icon">🚗</span> Trips completed today
        </button>
        <button class="example-chip" data-question="Top drivers">
          <span class="example-chip__icon">🏆</span> Top drivers
        </button>
        <button class="example-chip" data-question="Most common payment methods">
          <span class="example-chip__icon">💳</span> Most common payment methods
        </button>
      </div>
    </section>

    <!-- Conversation thread -->
    <section class="conversation" id="conversation" aria-live="polite"></section>

  </main>

  <!-- ============ PROMPT INPUT ============ -->
  <footer class="composer" id="composer">
    <div class="composer__inner">
      <form class="prompt-box" id="promptForm">
        <textarea
          id="promptInput"
          class="prompt-box__textarea"
          placeholder="Ask your business question..."
          rows="1"
          autofocus
        ></textarea>
        <button type="submit" class="prompt-box__send" id="sendBtn" aria-label="Send question" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </form>
      <p class="composer__hint">Press <kbd>Enter</kbd> to send · <kbd>Shift</kbd> + <kbd>Enter</kbd> for a new line</p>
    </div>
  </footer>

  <!-- Templates (cloned by JS, kept out of the tab order until used) -->
  <template id="tpl-user-message">
    <div class="msg msg--user">
      <div class="msg__bubble">
        <p class="msg__text"></p>
      </div>
      <div class="msg__meta">
        <span class="msg__time"></span>
      </div>
    </div>
  </template>

  <template id="tpl-assistant-message">
    <div class="msg msg--assistant">
      <div class="msg__avatar">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="8" width="16" height="12" rx="3"/><path stroke-linecap="round" d="M12 8V4m-3 0h6"/><circle cx="9" cy="14" r="1.2" fill="currentColor" stroke="none"/><circle cx="15" cy="14" r="1.2" fill="currentColor" stroke="none"/></svg>
      </div>
      <div class="msg__col">
        <div class="msg__bubble msg__bubble--assistant">
          <div class="msg__body"></div>
        </div>
        <div class="msg__meta">
          <span class="msg__time"></span>
          <button class="text-btn copy-answer-btn" type="button" style="display:none">Copy response</button>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-loading">
    <div class="msg msg--assistant msg--loading">
      <div class="msg__avatar">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="8" width="16" height="12" rx="3"/><path stroke-linecap="round" d="M12 8V4m-3 0h6"/><circle cx="9" cy="14" r="1.2" fill="currentColor" stroke="none"/><circle cx="15" cy="14" r="1.2" fill="currentColor" stroke="none"/></svg>
      </div>
      <div class="msg__col">
        <div class="msg__bubble msg__bubble--assistant loading-card">
          <div class="loading-dots"><span></span><span></span><span></span></div>
          <span class="loading-text">Generating SQL...</span>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-error">
    <div class="error-alert">
      <div class="error-alert__icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 8v5m0 3.5h.01"/></svg>
      </div>
      <div class="error-alert__body">
        <p class="error-alert__title">Something went wrong</p>
        <p class="error-alert__message"></p>
      </div>
    </div>
  </template>

  <template id="tpl-result-table">
    <div class="result-card">
      <div class="result-card__header">
        <div class="result-card__count">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/></svg>
          <span><strong class="row-count-num"></strong> returned rows</span>
        </div>
        <div class="result-card__actions">
          <div class="search-box">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="M21 21l-4.3-4.3"/></svg>
            <input type="text" class="search-input" placeholder="Search table..." />
          </div>
          <button class="text-btn copy-table-btn" type="button">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>
            Copy
          </button>
          <button class="text-btn download-csv-btn" type="button">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
            Download CSV
          </button>
        </div>
      </div>

      <div class="table-scroll">
        <table class="data-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="table-empty" style="display:none">No matching records found.</div>

      <div class="table-footer">
        <div class="rows-per-page">
          <label for="">Rows per page</label>
          <select class="rows-select">
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
          </select>
        </div>
        <div class="pagination">
          <button class="page-btn page-prev" type="button" aria-label="Previous page">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg>
          </button>
          <span class="page-status"></span>
          <button class="page-btn page-next" type="button" aria-label="Next page">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </template>

  <script type="module" src="js/app.js"></script>
</body>
</html>
